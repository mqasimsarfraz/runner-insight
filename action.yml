name: "Runner Insight"
description: "Run Inspektor Gadget gadgets on CI runners and generate a Job Summary report"
branding:
  icon: "activity"
  color: "green"

inputs:
  gadgets:
    description: |
      Newline-separated list of gadgets to run. Each line is a gadget name
      followed by optional ig flags for filtering, field selection, sorting, etc.

      Trace gadgets (trace_*) start at the beginning of the job and collect
      data until the end. Snapshot gadgets (snapshot_*) run during cleanup.

      Examples:
        trace_dns --fields name,qtype,rcode
        trace_open --failed --fields fname,error
        snapshot_process --fields comm,pid --sort pid
    required: true
  host:
    description: "Pass --host to ig/gadgetctl to show host-level data (not just containers). Default: true."
    required: false
    default: "true"
  fail-on-error:
    description: "Fail the action if any gadget returns an error. Default: false (report-only mode)."
    required: false
    default: "false"

runs:
  using: "node20"
  main: "dist/main/index.js"
  post: "dist/post/index.js"
  post-if: always()
